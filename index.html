<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Vader — Twizip Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Unica+One&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      background: #030308;
      --nav-bg: rgba(6, 7, 13, 0.9);
      --link: #a7a7ff;
      --link-hover: #fdd663;
      --panel: rgba(25, 25, 35, 0.85);
    }
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Space Grotesk", system-ui, sans-serif;
      background: radial-gradient(circle at top, #0d0d16 0%, #020205 65%);
      color: #fff;
    }
    a {
      color: var(--link);
      text-decoration: none;
    }
    a:hover {
      color: var(--link-hover);
    }
    img {
      max-width: 100%;
      display: block;
      border-radius: 16px;
    }
    .page {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: conic-gradient(from 90deg at 20% 10%, #090a13, #030305 60%);
    }
    .top-nav {
      padding: 1.25rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--nav-bg);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.65);
    }
    .logo img {
      height: 44px;
      width: auto;
      filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.5));
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }
    .nav-links {
      display: flex;
      gap: 2rem;
    }
    .nav-links a {
      font-size: 1.05rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    main {
      flex: 1;
      padding: 3rem 1.5rem 3.5rem;
      position: relative;
      overflow: hidden;
    }
    main::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.1), transparent 45%);
      pointer-events: none;
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.5rem;
    }
    .gallery-grid img {
      border-radius: 18px;
      box-shadow: 0 40px 90px rgba(0, 0, 0, 0.65);
      transition: transform 0.7s ease, filter 0.7s ease;
      filter: saturate(1.1);
    }
    .gallery-grid img:hover {
      transform: translateY(-6px) scale(1.02);
      filter: saturate(1.35) brightness(1.05);
    @media (max-width: 640px) {
      .top-nav {
        flex-direction: column;
        gap: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <nav class="top-nav">
      <a class="logo" href="index.html">
        <img src="project vader logo.png" alt="Project Vader logo">
        <span class="sr-only">Project Vader</span>
      </a>
      <div class="nav-links">
        <a href="privacy.html">Privacy Policy</a>
        <a href="terms.html">Terms of Service</a>
      </div>
    </nav>

    <main>
      <div class="gallery-grid">
        <img src="scene_2_2560x1440.png" alt="Distant battlefield with neon structures">
        <img src="scene_3_2560x1440.png" alt="Swamp terrain bathed in twilight">
        <img src="scene_4_2560x1440.png" alt="Snow-covered ruins under a stormy sky">
        <img src="scene_5_2560x1440.png" alt="High tech command center with glowing panels">
      </div>
    </main>
  </div>
</body>
</html>
